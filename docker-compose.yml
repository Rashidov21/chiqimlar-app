# Chiqimlar - Docker Compose (ishlab chiqish)
# ishlatish: docker-compose up -d
# Migratsiya: docker-compose exec web python manage.py migrate

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chiqimlar_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/chiqimlar_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
