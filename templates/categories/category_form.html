{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">{{ title }}</h1>
<div class="card max-w-lg">
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="id_name" class="block text-sm font-medium text-gray-700 mb-1">Turkum nomi</label>
            {{ form.name }}
            {% if form.name.errors %}<p class="mt-1 text-sm text-red-600">{{ form.name.errors.0 }}</p>{% endif %}
        </div>
        <div>
            <label for="id_emoji" class="block text-sm font-medium text-gray-700 mb-1">Emoji</label>
            {{ form.emoji }}
        </div>
        <div>
            <label for="id_order" class="block text-sm font-medium text-gray-700 mb-1">Tartib</label>
            {{ form.order }}
        </div>
        <div class="flex gap-3">
            <button type="submit" class="btn-primary">Saqlash</button>
            <a href="{% url 'categories:list' %}" class="btn-secondary">Bekor qilish</a>
        </div>
    </form>
</div>
{% endblock %}
